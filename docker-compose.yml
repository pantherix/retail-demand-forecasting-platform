

services:

  postgres:
    image: postgres:15-alpine
    container_name: retailgpt_postgres
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       retailgpt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: retailgpt_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/retailgpt
      USE_SQLITE:   "false"
      SECRET_KEY:   ${SECRET_KEY:-37dd8a2fc9b0a605d3802485d3f2412f089e7b9040a2dc6a9a2ec0d2a10e8492}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ENABLE_SEED_DATA: "1"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 15s
    volumes:
      - ./data:/app/data
      - ./backend/artifacts:/app/backend/artifacts
      - ./backend/generated_reports:/app/backend/generated_reports

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
      args:
        - API_URL=http://retailgpt_api:8000
    container_name: retailgpt_dashboard
    ports:
      - "3000:3000"
    environment:
      API_URL: http://retailgpt_api:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
